{% load static %}
<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}家計簿{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}" />
  </head>
  <body class="{% block body_class %}auth-page{% endblock %}">
    {% block body %}{% endblock %}
    {% block extra_js %}
    <script src="{% static 'accounts/js/auth-password-toggle.js' %}" defer></script>
    {% endblock %}
  </body>
</html>
