{% extends "accounts/base_auth.html" %}
{% block title %}ホーム — 家計簿{% endblock %}
{% block body %}
<div class="auth-card auth-card--home">
  <h1>家計簿</h1>
  <p>ログイン中: <strong>{{ request.user.email|default:request.user.username }}</strong></p>
  <form method="post" action="{% url 'accounts:logout' %}">
    {% csrf_token %}
    <button type="submit" class="auth-submit auth-submit--subtle">ログアウト</button>
  </form>
</div>
{% endblock %}
