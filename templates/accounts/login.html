{% extends "accounts/base_auth.html" %}
{% block title %}ログイン — 家計簿{% endblock %}
{% block body %}
<div class="auth-card">
  <h1 class="auth-brand">家計簿</h1>
  <p class="auth-title">ログイン</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {% include "accounts/partials/non_field_errors.html" %}
    {% for field in form %}{% include "accounts/partials/auth_field.html" %}{% endfor %}
    <button type="submit" class="auth-submit">ログイン</button>
  </form>
  <p class="auth-footer"><a href="{% url 'accounts:register' %}">アカウント作成はこちら</a></p>
</div>
{% endblock %}
