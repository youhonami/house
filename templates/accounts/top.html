{% extends "accounts/base_auth.html" %}
{% block title %}トップ — 家計簿{% endblock %}
{% block body %}
<div class="auth-card auth-card--home">
  <h1>トップページ（仮）</h1>
  <p class="top-placeholder">ここに今後、メインの画面を追加します。</p>
  <p class="top-user">
    {{ request.user.email|default:request.user.username }}
  </p>
  <form method="post" action="{% url 'accounts:logout' %}">
    {% csrf_token %}
    <button type="submit" class="auth-submit auth-submit--subtle">ログアウト</button>
  </form>
</div>
{% endblock %}
