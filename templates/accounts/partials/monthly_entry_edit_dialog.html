<dialog
  id="monthly-entry-edit-dialog"
  class="monthly-entry-dialog"
  aria-labelledby="monthly-entry-edit-title"
>
  <div class="monthly-entry-dialog__inner">
    <div class="monthly-entry-dialog__head">
      <h2 id="monthly-entry-edit-title" class="monthly-entry-dialog__title">
        編集
      </h2>
      <button
        type="button"
        class="monthly-entry-dialog__close"
        data-monthly-entry-dialog-close
        aria-label="閉じる"
      >
        ×
      </button>
    </div>
    <div
      id="monthly-entry-edit-errors"
      class="monthly-entry-dialog__errors"
      hidden
      role="alert"
    ></div>
    <form
      id="monthly-income-edit-form"
      class="monthly-entry-dialog__form income-form"
      method="post"
      hidden
    >
      {% csrf_token %}
      <div class="income-form__row">
        <div class="income-form__field">
          <label for="monthly-edit-income-date">日付</label>
          <input
            type="date"
            name="date"
            id="monthly-edit-income-date"
            class="auth-input"
            required
            autocomplete="off"
          />
        </div>
        <div class="income-form__field">
          <label for="monthly-edit-income-amount">金額</label>
          <input
            type="number"
            name="amount"
            id="monthly-edit-income-amount"
            class="auth-input"
            min="1"
            step="1"
            inputmode="numeric"
            required
          />
        </div>
      </div>
      <div class="income-form__field income-form__field--full">
        <label for="monthly-edit-income-note">内容</label>
        <input
          type="text"
          name="note"
          id="monthly-edit-income-note"
          class="auth-input"
          maxlength="200"
          placeholder="メモ"
        />
      </div>
      <div
        class="monthly-entry-dialog__actions monthly-entry-dialog__actions--split"
      >
        <button
          type="button"
          class="auth-submit monthly-entry-dialog__delete"
          data-monthly-entry-delete
        >
          削除する
        </button>
        <button type="submit" class="auth-submit monthly-entry-dialog__submit">
          保存する
        </button>
      </div>
    </form>
    <form
      id="monthly-expense-edit-form"
      class="monthly-entry-dialog__form income-form"
      method="post"
      hidden
    >
      {% csrf_token %}
      <div class="income-form__row">
        <div class="income-form__field">
          <label for="monthly-edit-expense-date">日付</label>
          <input
            type="date"
            name="date"
            id="monthly-edit-expense-date"
            class="auth-input"
            required
            autocomplete="off"
          />
        </div>
        <div class="income-form__field">
          <label for="monthly-edit-expense-amount">金額</label>
          <input
            type="number"
            name="amount"
            id="monthly-edit-expense-amount"
            class="auth-input"
            min="1"
            step="1"
            inputmode="numeric"
            required
          />
        </div>
      </div>
      <div class="income-form__field income-form__field--full">
        <label for="monthly-edit-expense-category">カテゴリ</label>
        <select
          name="category"
          id="monthly-edit-expense-category"
          class="auth-input"
          required
        >
          {% for value, label in expense_category_choices %}
          <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="income-form__field income-form__field--full">
        <label for="monthly-edit-expense-note">内容</label>
        <input
          type="text"
          name="note"
          id="monthly-edit-expense-note"
          class="auth-input"
          maxlength="200"
          placeholder="メモ"
        />
      </div>
      <div
        class="monthly-entry-dialog__actions monthly-entry-dialog__actions--split"
      >
        <button
          type="button"
          class="auth-submit monthly-entry-dialog__delete"
          data-monthly-entry-delete
        >
          削除する
        </button>
        <button type="submit" class="auth-submit monthly-entry-dialog__submit">
          保存する
        </button>
      </div>
    </form>
  </div>
</dialog>
