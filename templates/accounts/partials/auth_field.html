<div class="auth-field{% if field.field.widget.input_type == 'password' %} auth-field--password{% endif %}">
  {{ field.label_tag }}
  {% if field.field.widget.input_type == 'password' %}
  <div class="auth-password-wrap">
    {{ field }}
    <button
      type="button"
      class="auth-password-toggle"
      aria-pressed="false"
      aria-label="パスワードを表示"
    >
      <span class="auth-password-toggle__icon auth-password-toggle__icon--reveal" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </span>
      <span class="auth-password-toggle__icon auth-password-toggle__icon--mask" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
          <line x1="1" y1="1" x2="23" y2="23" />
        </svg>
      </span>
    </button>
  </div>
  {% else %}
  {{ field }}
  {% endif %}
  {% if field.errors %}
  <ul class="field-errors">
    {% for err in field.errors %}<li>{{ err }}</li>{% endfor %}
  </ul>
  {% endif %}
</div>
